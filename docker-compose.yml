services:
  app:
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./idae:/var/www/html/idae
      - ./logs:/var/log/apache2
    depends_on:
      - mongo-test
      - socket
    environment:
      - APACHE_RUN_USER=www-data
      - APACHE_RUN_GROUP=www-data
      - CONF_INC=/var/www/html/idae/web/conf.inc.php
      - DOCKER_ENV=1
      - MONGO_HOST=host.docker.internal
      - MONGO_HOST_PORT=27017
      - MDB_USER=${MDB_USER:-}
      - MDB_PASSWORD=${MDB_PASSWORD:-}
      - MDB_PREFIX=${MDB_PREFIX:-}
      - MONGO_ENV=${MONGO_ENV:-dev}
      - MONGO_TEST_HOST=mongo-test
      - MONGO_TEST_PORT=27017
      - MONGO_TEST_DSN=mongodb://mongo-test:27017
      - DEBUG_DB=
      - DEBUG_SESSION=
      - SOCKET_PORT=3005
    container_name: idae-legacy
    command: sh -c "sh /var/www/html/idae/web/wait-for-socket.sh && apache2-foreground"
    healthcheck:
      test: ["CMD", "curl", "-f", "-m", "3", "http://localhost/idae/web/check_mongo.php"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  socket:
    image: node:20-slim
    container_name: idae-socket
    working_dir: /app
    command: sh -c "npm install --no-audit --no-fund && npm run start"
    ports:
      - "3005:3005"
    env_file:
      - ./idae/web/app_node/.env
    environment:
      - PHP_BRIDGE_HOST=idae-legacy
      - LOG_DIR=/logs
    volumes:
      - ./idae/web/app_node:/app:cached
      - ./logs:/logs
    depends_on:
      - mongo-test
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http=require('http');http.get('http://127.0.0.1:3005/health',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1));\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Isolated MongoDB instance for PHPUnit tests.
  # Never receives production data. No auth required (test-only).
  mongo-test:
    image: mongo:7
    container_name: idae-mongo-test
    ports:
      - "27018:27017"
    tmpfs:
      - /data/db
    restart: "no"
